<!doctype html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98357BZM3L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-98357BZM3L');
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2f5b3f">
  <meta name="copyright" content="All rights reserved – Homegrown Directory © 2025. Reproduction or reuse prohibited.">
  {% if page.noindex %}
  <meta name="robots" content="noindex,nofollow">
  {% endif %}
  <link rel="icon" href="{{ '/Favicon-32.png' | relative_url }}" sizes="32x32">
  {% comment %}SEO/AEO meta built from page data and practices{% endcomment %}
  {% include seo-meta.html %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("hg-theme");
        var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        var theme = stored || (prefersDark ? "dark" : "light");
        if (theme === "dark") {
          document.documentElement.dataset.theme = "dark";
        } else {
          delete document.documentElement.dataset.theme;
        }
      } catch (e) {
        // fail silently
      }
    })();
  </script>
  {% if page.map %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" integrity="sha256-YU3qCpj/P06tdPBJGPax0bm6Q1wltfwjsho5TR4+TYc=" crossorigin="">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" integrity="sha256-YSWCMtmNZNwqex4CEw1nQhvFub2lmU7vcCKP+XVwwXA=" crossorigin="">
  {% endif %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% include header.html %}
  <main id="main-content" class="page">
    {{ content }}
  </main>
  {% include footer.html %}
  {% if page.map %}
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha256-Hk4dIpcqOSb0hZjgyvFOP+cEmDXUKKNE/tT542ZbNQg=" crossorigin=""></script>
  {% endif %}
  <script>
    window.HG_INDEX_URL = '{{ '/search.json' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}';
    window.HG_BASEURL = '{{ site.baseurl | default: "" }}';
    window.HG_ENTITY_TYPES = {{ site.data.entity_types | jsonify }};
  </script>
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
