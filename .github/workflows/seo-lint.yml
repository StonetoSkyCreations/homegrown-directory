name: SEO Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  seo-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Check layouts
        run: python3 scripts/check_layouts.py

      - name: Setup Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1
        with:
          ruby-version: "3.2"
          bundler: "2.4.22"
          bundler-cache: true

      - name: Validate content
        run: ruby scripts/validate_content.rb

      - name: Relationship audit (report only)
        run: ruby scripts/relationship_audit.rb

      - name: Build site
        run: bundle exec jekyll build

      - name: Run SEO lint
        run: python3 scripts/seo_lint.py
